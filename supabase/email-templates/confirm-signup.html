<!--
  Goalify — branded email template (Supabase Auth)
  ───────────────────────────────────────────────
  Where to use it:
    Supabase Dashboard → Authentication → Email Templates → "Confirm signup"
    (also reuse for Magic Link / Reset password by swapping the heading + button).

  IMPORTANT — the logo must be a PUBLIC absolute URL (email clients can't load
  local files). After you deploy, upload assets/favicon.png somewhere public
  (e.g. your Goalify domain or a Supabase Storage public bucket) and replace
  LOGO_URL below with that link, e.g.:
    https://goalify.app/assets/favicon.png
-->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#FAFAFA;padding:32px 0;font-family:Inter,Segoe UI,Arial,sans-serif">
  <tr><td align="center">
    <table width="480" cellpadding="0" cellspacing="0" style="background:#FFFFFF;border:1px solid #E5E7EB;border-radius:20px;overflow:hidden">
      <tr><td style="padding:32px 36px 8px;text-align:center">
        <img src="LOGO_URL" alt="Goalify" width="56" height="56" style="display:inline-block" />
        <div style="margin-top:10px;font-size:22px;font-weight:800;color:#111827">Goal<span style="color:#7C3AED">ify</span></div>
      </td></tr>
      <tr><td style="padding:8px 36px 28px;text-align:center;color:#111827">
        <h1 style="margin:18px 0 6px;font-size:20px;font-weight:800">Confirm your email</h1>
        <p style="margin:0 0 22px;font-size:14px;line-height:1.6;color:#6B7280">Welcome to Goalify! Tap the button below to confirm your email and start turning every euro into progress.</p>
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#7C3AED;color:#fff;text-decoration:none;font-weight:700;font-size:15px;padding:13px 28px;border-radius:12px">Confirm your email</a>
        <p style="margin:24px 0 0;font-size:12px;color:#9CA3AF">If you didn't create a Goalify account, you can safely ignore this email.</p>
      </td></tr>
      <tr><td style="padding:16px 36px 28px;text-align:center;border-top:1px solid #E5E7EB;color:#9CA3AF;font-size:11px">© Goalify · Track spending, build habits, reach your goals.</td></tr>
    </table>
  </td></tr>
</table>
