<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goalify — Turn Every Euro Into Progress</title>
  <meta name="description" content="AI-powered personal finance & goal-tracking. Track spending, reach goals faster, and get AI financial coaching." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#6366f1', 600: '#4f46e5' },
            accent: { blue: '#3b82f6', purple: '#8b5cf6', violet: '#a855f7' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: {
            float: 'float 6s ease-in-out infinite',
            'fade-up': 'fadeUp .6s ease forwards',
          },
          keyframes: {
            float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } },
            fadeUp: { '0%': { opacity: 0, transform: 'translateY(20px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
          },
        },
      },
    };

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: dark; }
    body { background:#070A14; color:#f1f5f9; font-family:Inter,system-ui,sans-serif; overflow-x:hidden; }
    .glass { background:rgba(255,255,255,.04); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,.08); }
    .glass-strong { background:rgba(255,255,255,.07); backdrop-filter:blur(22px); border:1px solid rgba(255,255,255,.12); }
    .gtext { background:linear-gradient(135deg,#60a5fa,#a78bfa,#c084fc); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; border-radius:.75rem; padding:.75rem 1.5rem; font-weight:600; transition:.25s; cursor:pointer; border:none; }
    .btn-primary { color:#fff; background:linear-gradient(135deg,#4f46e5,#8b5cf6); box-shadow:0 8px 24px -8px rgba(99,102,241,.6); }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 12px 32px -8px rgba(139,92,246,.8); }
    .btn-ghost { color:#fff; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); }
    .btn-ghost:hover { background:rgba(255,255,255,.1); }
    .orb { position:absolute; border-radius:9999px; filter:blur(80px); opacity:.5; pointer-events:none; }
    .input { width:100%; border-radius:.75rem; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); padding:.65rem 1rem; font-size:.875rem; outline:none; color:#f1f5f9; }
    .input:focus { border-color:rgba(168,85,247,.6); }
    ::-webkit-scrollbar { width:9px; height:9px; } ::-webkit-scrollbar-track { background:#070A14; }
    ::-webkit-scrollbar-thumb { background:linear-gradient(#4f46e5,#8b5cf6); border-radius:8px; }
    .grid-bg { background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px); background-size:46px 46px; -webkit-mask-image:radial-gradient(ellipse at center,#000 35%,transparent 75%); mask-image:radial-gradient(ellipse at center,#000 35%,transparent 75%); }
    .nav-link.active { background:linear-gradient(90deg,rgba(59,130,246,.2),rgba(139,92,246,.2)); }
    [x-cloak]{display:none}
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
  // ============================================================
  // GOALIFY — single-file static SPA (demo). Data stored locally.
  // ============================================================
  const STORE_KEY = 'goalify_state_v1';

  const PLANS = {
    free:    { id:'free',    name:'Free',    price:0,  goalLimit:3,  tagline:'Everything to start tracking.', features:['Expense tracking','Daily→5-year analytics','Spending categories','Money personality','Up to 3 goals'] },
    pro:     { id:'pro',     name:'Pro',     price:3,  goalLimit:-1, highlight:true, tagline:'Smarter saving with AI.', features:['Unlimited goals','AI Assistant Lite','Spending predictions','Budget & goal tips','Budget alerts','Free for students'] },
    premium: { id:'premium', name:'Premium', price:5,  goalLimit:-1, tagline:'Your AI financial coach.', features:['Everything in Pro','AI Financial Coach','Savings strategies','Future forecasts','Receipt scanner','Priority support'] },
    business:{ id:'business',name:'Business',price:10, goalLimit:-1, tagline:'Run your numbers.', features:['Business dashboard','Revenue & expense tracking','Profit calculations','Monthly reports','Team management','Tax reports'] },
  };
  const PLAN_ORDER = ['free','pro','premium','business'];

  const CATS = {
    food:{l:'Food',c:'#f97316',e:'🍔'}, dining:{l:'Dining out',c:'#fb923c',e:'🍽️'}, groceries:{l:'Groceries',c:'#22c55e',e:'🛒'},
    transport:{l:'Transport',c:'#3b82f6',e:'🚗'}, housing:{l:'Housing',c:'#8b5cf6',e:'🏠'}, utilities:{l:'Utilities',c:'#06b6d4',e:'💡'},
    shopping:{l:'Shopping',c:'#ec4899',e:'🛍️'}, entertainment:{l:'Entertainment',c:'#a855f7',e:'🎬'}, subscriptions:{l:'Subscriptions',c:'#6366f1',e:'🔁'},
    health:{l:'Health',c:'#14b8a6',e:'💊'}, education:{l:'Education',c:'#eab308',e:'📚'}, savings:{l:'Savings',c:'#10b981',e:'💰'},
    income:{l:'Income',c:'#4ade80',e:'💵'}, other:{l:'Other',c:'#94a3b8',e:'📦'},
  };

  const PERSONAS = {
    saver:{name:'The Saver',emoji:'🛡️',desc:"Disciplined and security-focused. Money in the bank gives you peace of mind.",recs:['Put idle cash to work','Set a stretch goal','Automate a small investment']},
    goal_chaser:{name:'The Goal Chaser',emoji:'🎯',desc:'You thrive on targets. A clear goal keeps you motivated.',recs:['Focus on your top 2 goals','Use streaks to stay consistent','Celebrate milestones']},
    student_budgeter:{name:'The Student Budgeter',emoji:'🎓',desc:'Making the most of a tight budget. Every euro counts.',recs:['Verify student status for free Pro','Build a €100 buffer','Track subscriptions']},
    lifestyle_spender:{name:'The Lifestyle Spender',emoji:'✨',desc:'You value experiences and quality.',recs:["Set a 'fun budget'",'Automate savings first','Try a no-delivery week']},
    impulse_buyer:{name:'The Impulse Buyer',emoji:'⚡',desc:'You buy in the moment. Fun, but it can sting later.',recs:['Use a 24-hour rule','Try a no-impulse challenge','Turn on budget alerts']},
    future_investor:{name:'The Future Investor',emoji:'📈',desc:'You think long-term. Growing wealth is your game.',recs:['Keep 3 months liquid','Use the Future Simulator','Diversify your goals']},
  };

  const QUIZ = [
    {id:'spending',q:'How would you describe your spending?',opts:[
      {l:'I plan every purchase',s:{saver:3,goal_chaser:1}},{l:'Mostly planned, some treats',s:{goal_chaser:2,lifestyle_spender:1}},
      {l:'I spend on what I enjoy',s:{lifestyle_spender:3}},{l:'I buy on impulse a lot',s:{impulse_buyer:3}}]},
    {id:'income',q:"What's your monthly income range?",opts:[
      {l:'Under €500',s:{student_budgeter:3}},{l:'€500 – €1,500',s:{student_budgeter:1,saver:1}},
      {l:'€1,500 – €3,000',s:{goal_chaser:1,future_investor:1}},{l:'€3,000+',s:{future_investor:2,lifestyle_spender:1}}]},
    {id:'savings',q:'How much of your income do you save?',opts:[
      {l:'20%+ every month',s:{saver:3,future_investor:2}},{l:'Around 10%',s:{saver:1,goal_chaser:1}},
      {l:"Whatever's left",s:{lifestyle_spender:2}},{l:'I struggle to save',s:{impulse_buyer:2,student_budgeter:1}}]},
    {id:'goal',q:"What's your main financial goal?",opts:[
      {l:'Build an emergency fund',s:{saver:2}},{l:'Save for a big purchase',s:{goal_chaser:3}},
      {l:'Invest and grow wealth',s:{future_investor:3}},{l:'Stop overspending',s:{impulse_buyer:2}}]},
    {id:'student',q:'Are you currently a student?',opts:[
      {l:'Yes, full-time',s:{student_budgeter:3}},{l:'Yes, part-time',s:{student_budgeter:2}},{l:'No',s:{}}]},
    {id:'category',q:'Where does most of your money go?',opts:[
      {l:'Essentials (rent, bills, food)',s:{saver:1,student_budgeter:1}},{l:'Dining out & delivery',s:{lifestyle_spender:2,impulse_buyer:1}},
      {l:'Shopping & gadgets',s:{impulse_buyer:2}},{l:'Saving & investing',s:{future_investor:3}}]},
  ];

  const CHALLENGES = [
    {key:'save100',title:'Save €100 Challenge',desc:'Put aside €100 in two weeks.',emoji:'💰',xp:100},
    {key:'nodelivery',title:'No Delivery Week',desc:'No food delivery for 7 days.',emoji:'🍳',xp:60},
    {key:'nocoffee',title:'No Coffee Week',desc:'Skip the café for a week.',emoji:'☕',xp:50},
    {key:'noimpulse',title:'No Impulse-Buy Challenge',desc:'No non-essentials for 10 days.',emoji:'🛑',xp:80},
  ];
  const BADGES = [
    {e:'🎯',n:'Goal Setter'},{e:'🌱',n:'First Save'},{e:'🔥',n:'On Fire'},
    {e:'🏆',n:'Challenger'},{e:'💎',n:'Big Saver'},{e:'⭐',n:'Rising Star'},
  ];

  // -------------------- State --------------------
  const defaultState = () => ({
    user: null,
    profile: { personality:null, income:0, currency:'EUR', xp:0, plan:'free', onboarded:false,
      notifications:{weekly:true,alerts:true,goals:true,news:false} },
    goals: [],
    expenses: [],
    challenges: [],
    quizAnswers: {},
  });
  let state = load();
  function load(){ try { return Object.assign(defaultState(), JSON.parse(localStorage.getItem(STORE_KEY))||{}); } catch(e){ return defaultState(); } }
  function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  function reset(){ state = defaultState(); save(); }

  // -------------------- Helpers --------------------
  const $ = (s,el=document)=>el.querySelector(s);
  const fmt = (n,cur=state.profile.currency||'EUR')=> new Intl.NumberFormat('en-IE',{style:'currency',currency:cur,maximumFractionDigits:(n%1===0?0:2)}).format(n||0);
  const uid = ()=> Math.random().toString(36).slice(2,10);
  const pct = (a,b)=> b? Math.min(100,Math.round(a/b*100)):0;
  const esc = (s)=> (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const todayISO = ()=> new Date().toISOString().slice(0,10);

  function computePersona(ans){
    const t={saver:0,goal_chaser:0,student_budgeter:0,lifestyle_spender:0,impulse_buyer:0,future_investor:0};
    QUIZ.forEach(q=>{ const o=q.opts[ans[q.id]]; if(o) for(const k in o.s) t[k]+=o.s[k]; });
    let best='goal_chaser',bs=-1; for(const k in t) if(t[k]>bs){bs=t[k];best=k;} return best;
  }

  function snapshot(){
    const now=new Date(), mStart=new Date(now.getFullYear(),now.getMonth(),1);
    const monthSpend = state.expenses.filter(e=>e.category!=='income'&&e.category!=='savings'&&new Date(e.date)>=mStart).reduce((s,e)=>s+e.amount,0);
    const monthIncomeLogged = state.expenses.filter(e=>e.category==='income'&&new Date(e.date)>=mStart).reduce((s,e)=>s+e.amount,0);
    const income = state.profile.income>0? state.profile.income : monthIncomeLogged;
    const leftover = income - monthSpend;
    const savingsRate = income>0? Math.max(0,Math.round(leftover/income*100)):0;
    const active = state.goals.filter(g=>!g.completed).length;
    const completed = state.goals.filter(g=>g.completed).length;
    const goalAvg = state.goals.length? Math.round(state.goals.reduce((s,g)=>s+Math.min(100,g.saved/Math.max(1,g.target)*100),0)/state.goals.length):0;
    return {income,spending:monthSpend,leftover,savingsRate,active,completed,goalAvg};
  }
  function goalifyScore(s){
    const sav=Math.min(40,s.savingsRate/100*40), gc=Math.min(25,s.goalAvg*.25);
    const sp=s.income>0?Math.min(20,Math.max(0,(1-s.spending/s.income)*20)):10;
    return Math.round(sav+gc+sp+ Math.min(15, (state.profile.xp/300)*15));
  }
  function healthScore(s){
    let v=50; v+=Math.min(30,s.savingsRate*.6); v+= s.leftover>0?10:-15; if(s.active>0) v+=5;
    v=Math.max(0,Math.min(100,Math.round(v)));
    const r = v>=80?'Excellent':v>=60?'Good':v>=40?'Fair':'Needs work'; return {v,r};
  }
  function levelFromXp(xp){ return {level:Math.floor(xp/100)+1, inLvl:xp%100}; }

  // -------------------- Icons (inline svg) --------------------
  const I = {
    logo:'<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2L4 7v10l8 5 8-5V7l-8-5z" stroke-linejoin="round"/><path d="M12 7v5l3.5 2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    spark:'<svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8" stroke-linecap="round"/></svg>',
    check:'<svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  };

  // ============================================================
  // VIEWS
  // ============================================================
  function navbar(){
    return `<header class="fixed inset-x-0 top-0 z-40 px-4 py-4">

        <div class="glass-strong flex items-center justify-between rounded-2xl px-4 py-3">
          <a href="#home" class="flex items-center gap-2">
            <span class="flex h-9 w-9 items-center justify-center rounded-xl text-white" style="background:linear-gradient(135deg,#4f46e5,#8b5cf6)">${I.logo}</span>
            <span class="text-xl font-extrabold">Goal<span class="gtext">ify</span></span>
          </a>
          <nav class="hidden gap-8 md:flex text-sm text-slate-300">
            <a href="#home" class="hover:text-white">Features</a>
            <a href="#home" data-scroll="pricing" class="hover:text-white">Pricing</a>
            <a href="#home" data-scroll="ai" class="hover:text-white">AI Demo</a>
            <a href="#home" data-scroll="faq" class="hover:text-white">FAQ</a>
          </nav>
          <div class="flex items-center gap-3">
            ${state.user
              ? `<a href="#app/dashboard" class="btn btn-primary !py-2 !px-4 text-sm">Open app</a>`
              : `<a href="#login" class="text-sm text-slate-300 hover:text-white">Log in</a><a href="#signup" class="btn btn-primary !py-2 !px-4 text-sm">Get started</a>`}
          </div>
        </div>
      </div>
    </header>`;
  }

  function landing(){
    const persona = state.profile.personality ? PERSONAS[state.profile.personality] : null;
    return `${navbar()}
    <main class="relative">
      <!-- HERO -->
      <section class="relative overflow-hidden pt-40 pb-24">
        <div class="orb animate-float" style="top:-10%;left:5%;width:460px;height:460px;background:radial-gradient(circle,rgba(59,130,246,.45),transparent 70%)"></div>
        <div class="orb animate-float" style="top:15%;right:-5%;width:520px;height:520px;background:radial-gradient(circle,rgba(168,85,247,.4),transparent 70%);animation-delay:2s"></div>
        <div class="absolute inset-0 grid-bg opacity-60"></div>
        <div class="relative mx-auto max-w-4xl px-4 text-center">
          <div class="mb-6 inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-4 py-1.5 text-sm text-slate-300">${I.spark} AI-powered financial coaching</div>
          <h1 class="text-5xl font-extrabold leading-tight sm:text-6xl md:text-7xl">Turn Every Euro<br>Into <span class="gtext">Progress.</span></h1>
          <p class="mx-auto mt-6 max-w-2xl text-lg text-slate-400">Track spending, reach goals faster, and receive AI-powered financial coaching — all in one beautifully simple platform.</p>
          <div class="mt-10 flex flex-col items-center justify-center gap-4 sm:flex-row">
            <a href="#signup" class="btn btn-primary">Start for free →</a>
            <a href="#home" data-scroll="ai" class="btn btn-ghost">See the AI in action</a>
          </div>
          <p class="mt-4 text-sm text-slate-500">No credit card required · Free forever plan · Students get Pro free</p>
        </div>
        <!-- preview -->
        <div class="relative mx-auto mt-20 max-w-5xl px-4">
          <div class="glass-strong rounded-3xl p-2" style="box-shadow:0 0 80px -20px rgba(139,92,246,.6)">
            <div class="rounded-2xl bg-[#070A14]/80 p-6">
              <div class="grid grid-cols-2 gap-4 sm:grid-cols-4">
                ${[['💶','Income','€2,400'],['📈','Saved','€680'],['🎯','Goals','4'],['✨','Goalify Score','82']].map(s=>`
                  <div class="glass rounded-xl p-4 text-left"><div class="text-2xl">${s[0]}</div><p class="mt-2 text-2xl font-bold">${s[2]}</p><p class="text-xs text-slate-400">${s[1]}</p></div>`).join('')}
              </div>
              <div class="mt-4 flex items-end gap-2 glass rounded-xl p-4" style="height:160px">
                ${[40,65,45,80,55,90,70,100,60,85,75,95].map(h=>`<div class="flex-1 rounded-t" style="height:${h}%;background:linear-gradient(to top,#3b82f6,#8b5cf6);opacity:${.5+h/200}"></div>`).join('')}
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- FEATURES -->
      <section class="py-24 mx-auto max-w-7xl px-4">
        <div class="mx-auto max-w-2xl text-center">
          <p class="text-sm font-semibold uppercase tracking-widest gtext">Features</p>
          <h2 class="mt-3 text-4xl font-bold sm:text-5xl">Everything you need to <span class="gtext">win with money</span></h2>
        </div>
        <div class="mt-14 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
          ${[
            ['🧠','AI Financial Coach','Personalized coaching that analyzes your spending and builds savings strategies.'],
            ['🎯','Goal Tracking','Set goals for a phone, a trip, an emergency fund — watch progress in real time.'],
            ['📊','Deep Analytics','Daily, weekly, monthly, yearly and 5-year analytics with projections.'],
            ['🧾','Receipt Scanner','Snap a receipt and AI extracts store, amount, category & date.'],
            ['🔁','Subscription Detector','Finds Netflix, Spotify, ChatGPT & more with monthly/yearly cost.'],
            ['🏆','Challenges & Rewards','Take savings challenges, earn XP, badges and achievements.'],
            ['🔥','Streaks','Stay consistent with days-under-budget, savings and goal streaks.'],
            ['✨','Goalify Score','A 0–100 score for your savings, spending and consistency.'],
            ['🛡️','Bank-grade Security','Encrypted data, secure auth, privacy-first design.'],
          ].map(f=>`<div class="glass rounded-2xl p-6 hover:-translate-y-1 transition"><div class="text-3xl">${f[0]}</div><h3 class="mt-4 text-lg font-semibold">${f[1]}</h3><p class="mt-2 text-sm text-slate-400">${f[2]}</p></div>`).join('')}
        </div>
      </section>

      <!-- AI DEMO -->
      <section id="sec-ai" class="py-24 mx-auto max-w-7xl px-4">
        <div class="mx-auto max-w-2xl text-center">
          <p class="text-sm font-semibold uppercase tracking-widest gtext">AI in action</p>
          <h2 class="mt-3 text-4xl font-bold sm:text-5xl">Your money, explained by AI</h2>
        </div>
        <div class="mt-14 grid gap-6 lg:grid-cols-3">
          <div class="lg:col-span-2 glass-strong rounded-2xl p-6">
            <div class="mb-4 flex items-center gap-2 font-semibold">${I.spark} AI Financial Coach</div>
            <div class="space-y-4">
              <div class="flex justify-end"><div class="max-w-[80%] rounded-2xl px-4 py-3 text-sm text-white" style="background:linear-gradient(135deg,#4f46e5,#8b5cf6)">Can I afford a €1,200 MacBook by December?</div></div>
              <div class="flex justify-start"><div class="max-w-[80%] glass rounded-2xl px-4 py-3 text-sm">Based on your €680/mo savings, you'd reach €1,200 in ~7 weeks. Halving your €80/week delivery gets you there 2 weeks sooner. Want me to create the goal?</div></div>
            </div>
            <div class="mt-6 flex items-center gap-2 glass rounded-xl px-4 py-3"><input class="flex-1 bg-transparent text-sm outline-none" placeholder="Ask your AI coach anything…"><button class="btn btn-primary !p-2">→</button></div>
          </div>
          <div class="glass rounded-2xl p-6 flex flex-col">
            <div class="mb-3 flex items-center gap-2 font-semibold">🔥 AI Roast Mode</div>
            <p id="roast" class="flex-1 text-lg">You spent €80 on fast food this week. That's enough for many homemade meals 🍳</p>
            <button class="btn btn-ghost mt-4 text-sm" data-action="roast">Roast me again</button>
          </div>
        </div>
      </section>

      <!-- PRICING -->
      <section id="sec-pricing" class="py-24 mx-auto max-w-7xl px-4">
        <div class="mx-auto max-w-2xl text-center">
          <p class="text-sm font-semibold uppercase tracking-widest gtext">Pricing</p>
          <h2 class="mt-3 text-4xl font-bold sm:text-5xl">Simple, honest pricing</h2>
          <p class="mt-4 text-slate-400">Start free. Upgrade when ready. Students get Pro free.</p>
        </div>
        <div class="mt-14 grid gap-6 lg:grid-cols-4">
          ${PLAN_ORDER.map(id=>{const p=PLANS[id];return `
            <div class="relative flex flex-col rounded-2xl p-6 ${p.highlight?'glass-strong':'glass'}" ${p.highlight?'style="box-shadow:0 0 40px -10px rgba(99,102,241,.5)"':''}>

        </div>

  // ============================================================
  // CHART HELPERS
  // ============================================================
  let charts = {};
  function destroyCharts(){ Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={}; }
  function isSpend(e){ return e.category!=='income'&&e.category!=='savings'; }
  function series(tf){
    const spend=state.expenses.filter(isSpend), now=new Date(), out=[];
    const sum=(from,to)=>spend.filter(e=>{const d=new Date(e.date);return d>=from&&d<=to;}).reduce((s,e)=>s+e.amount,0);
    if(tf==='daily'){for(let i=13;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);const k=d.toISOString().slice(0,10);out.push([d.toLocaleDateString('en-IE',{day:'numeric',month:'short'}),spend.filter(e=>e.date===k).reduce((s,e)=>s+e.amount,0)]);}}
    else if(tf==='weekly'){for(let i=11;i>=0;i--){const end=new Date(now);end.setDate(now.getDate()-i*7);const st=new Date(end);st.setDate(end.getDate()-6);out.push(['W'+(12-i),sum(st,end)]);}}
    else if(tf==='monthly'){for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const e=new Date(now.getFullYear(),now.getMonth()-i+1,0);out.push([d.toLocaleDateString('en-IE',{month:'short'}),sum(d,e)]);}}
    else if(tf==='yearly'){for(let i=4;i>=0;i--){const y=now.getFullYear()-i;out.push([''+y,spend.filter(e=>new Date(e.date).getFullYear()===y).reduce((s,e)=>s+e.amount,0)]);}}
    else {const months=new Set(spend.map(e=>e.date.slice(0,7)));const avg=spend.length?spend.reduce((s,e)=>s+e.amount,0)/Math.max(1,months.size):0;for(let i=0;i<=5;i++)out.push([i===0?'Now':'Y+'+i,Math.round(avg*12*i)]);}
    return out;
  }
  function drawSpend(tf){
    const el=document.getElementById('spendChart'); if(!el) return;
    const data=series(tf); const ctx=el.getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,260); grad.addColorStop(0,'rgba(139,92,246,.5)'); grad.addColorStop(1,'rgba(59,130,246,.02)');
    charts.spend=new Chart(ctx,{type:'line',data:{labels:data.map(d=>d[0]),datasets:[{data:data.map(d=>d[1]),borderColor:'#a855f7',backgroundColor:grad,fill:true,tension:.4,pointRadius:0,borderWidth:2.5}]},options:chartOpts()});
  }
  function drawCat(){
    const el=document.getElementById('catChart'); if(!el) return;
    const now=new Date(),mStart=new Date(now.getFullYear(),now.getMonth(),1);
    const map={}; state.expenses.filter(e=>isSpend(e)&&new Date(e.date)>=mStart).forEach(e=>map[e.category]=(map[e.category]||0)+e.amount);
    const keys=Object.keys(map);
    if(!keys.length){ el.parentElement.querySelector('canvas').insertAdjacentHTML('afterend','<p class="py-8 text-center text-sm text-slate-400">No spending this month yet.</p>'); el.style.display='none'; return; }
    charts.cat=new Chart(el,{type:'doughnut',data:{labels:keys.map(k=>CATS[k].l),datasets:[{data:keys.map(k=>map[k]),backgroundColor:keys.map(k=>CATS[k].c),borderWidth:0}]},options:{plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:11},boxWidth:12}}},cutout:'62%'}});
  }
  function chartOpts(){return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)}}},scales:{x:{grid:{display:false},ticks:{color:'#64748b',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#64748b',font:{size:11}}}}};}

  function runSimulator(){
    const inc=+($('#simIncome')?.value||0), exp=+($('#simExp')?.value||0), goal=+($('#simGoal')?.value||0), rate=+($('#simRate')?.value||0);
    if($('#simIncomeVal')) $('#simIncomeVal').textContent=fmt(inc);
    if($('#simExpVal')) $('#simExpVal').textContent=fmt(exp);
    if($('#simGoalVal')) $('#simGoalVal').textContent=fmt(goal);
    if($('#simRateVal')) $('#simRateVal').textContent=rate+'%';
    const monthly=Math.max(0,inc-exp), mr=rate/100/12;
    let bal=0; const pts=[]; for(let m=0;m<=60;m++){pts.push(Math.round(bal)); bal=bal*(1+mr)+monthly;}
    let months=null,b=0; for(let m=1;m<=600;m++){b=b*(1+mr)+monthly; if(b>=goal){months=m;break;}}
    if($('#simSave')) $('#simSave').textContent=fmt(monthly);
    if($('#simMonths')) $('#simMonths').textContent=months?months+' mo':'—';
    if($('#sim5y')) $('#sim5y').textContent=fmt(pts[pts.length-1]);
    const el=document.getElementById('simChart'); if(el){ if(charts.sim)charts.sim.destroy(); charts.sim=new Chart(el,{type:'line',data:{labels:pts.map((_,i)=>i%12===0?(i===0?'Now':'Y'+i/12):''),datasets:[{data:pts,borderColor:'#a855f7',backgroundColor:'rgba(139,92,246,.1)',fill:true,tension:.3,pointRadius:0,borderWidth:2.5}]},options:chartOpts()}); }
  }

  // ============================================================
  // AI (rule-based, local)
  // ============================================================
  function aiReply(msg){
    const s=snapshot(), m=msg.toLowerCase();
    if(m.includes('roast')) return roastLine();
    if(m.includes('save')||m.includes('saving')){
      return `You're saving about ${s.savingsRate}% of your income. ${s.savingsRate<20?`Aim for 20% — cutting your biggest category by a third would get you most of the way there.`:`That's solid! Funnel the extra into your top goal to hit it sooner.`}`;
    }
    if(m.includes('overspend')||m.includes('spending')||m.includes('where')){
      const now=new Date(),mStart=new Date(now.getFullYear(),now.getMonth(),1),map={};
      state.expenses.filter(e=>isSpend(e)&&new Date(e.date)>=mStart).forEach(e=>map[e.category]=(map[e.category]||0)+e.amount);
      const top=Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
      return top?`Your biggest category this month is ${CATS[top[0]].l} at ${fmt(top[1])}. Trimming it by 20% would free up ${fmt(top[1]*0.2)} toward your goals.`:`Add a few expenses and I'll pinpoint where your money goes.`;
    }
    if(m.includes('plan')){
      return `Here's a simple plan: 1) Save ${fmt(Math.max(50,s.income*0.2))}/mo automatically. 2) Cap discretionary spending. 3) Put every windfall toward your top goal. Want me to set up a goal for that?`;
    }
    if(m.includes('afford')||m.includes('buy')){
      return `At your current savings of ${fmt(Math.max(0,s.leftover))}/mo, tell me the price and I'll estimate how many months it'll take — or open the Future Simulator to model it.`;
    }
    return `Good question! Based on your data — income ${fmt(s.income)}, spending ${fmt(s.spending)}, savings rate ${s.savingsRate}% — focus on automating savings and tracking your top category. Ask me about saving, overspending, or a savings plan.`;
  }
  const ROASTS=[
    "You spent on fast food again this week. That's enough for a week of homemade meals 🍳",
    "Your savings account called. It's feeling neglected 📞",
    "Another mysterious 'Other' expense. Even you don't know what that was 🕵️",
    "Midnight you is expensive. Maybe set a curfew on the wallet 🌙",
    "Your barista knows your order better than your budget does ☕",
  ];
  function roastLine(){
    const now=new Date(),mStart=new Date(now.getFullYear(),now.getMonth(),1),map={};
    state.expenses.filter(e=>isSpend(e)&&new Date(e.date)>=mStart).forEach(e=>map[e.category]=(map[e.category]||0)+e.amount);
    const top=Object.entries(map).sort((a,b)=>b[1]-a[1])[0];
    if(top) return `You spent ${fmt(top[1])} on ${CATS[top[0]].l.toLowerCase()} this month. Bold strategy 💸`;
    return ROASTS[Math.floor(Math.random()*ROASTS.length)];
  }
  let chat=[{role:'ai',text:"Hi! I'm your AI coach. Ask me about saving, spending, or a plan — or hit a suggestion below."}];
  function renderChat(){
    const log=document.getElementById('chatLog'); if(!log) return;
    log.innerHTML=chat.map(m=>`<div class="flex ${m.role==='user'?'justify-end':'justify-start'}"><div class="max-w-[80%] rounded-2xl px-4 py-3 text-sm ${m.role==='user'?'text-white':'glass'}" style="${m.role==='user'?'background:linear-gradient(135deg,#4f46e5,#8b5cf6)':''}">${esc(m.text)}</div></div>`).join('');
    log.scrollTop=log.scrollHeight;
  }
  function sendChat(q){ chat.push({role:'user',text:q}); renderChat(); setTimeout(()=>{chat.push({role:'ai',text:aiReply(q)});renderChat();},350); }

  document.addEventListener('click',e=>{
    const a=e.target.closest('[data-action]');
    const scroll=e.target.closest('[data-scroll]');
    if(scroll){ const id=scroll.getAttribute('data-scroll'); const map={pricing:'sec-pricing',ai:'sec-ai',faq:'sec-faq'}; const el=document.getElementById(map[id]); if(el){e.preventDefault(); if(location.hash&&location.hash!=='#home'){location.hash='#home'; setTimeout(()=>document.getElementById(map[id])?.scrollIntoView({behavior:'smooth'}),60);} else el.scrollIntoView({behavior:'smooth'});} return; }
    if(!a) return;
    const act=a.getAttribute('data-action');
    if(act==='faq'){ const i=a.getAttribute('data-i'); const el=document.getElementById('faq-'+i); const ic=document.getElementById('faq-ic-'+i); el.classList.toggle('hidden'); ic.textContent=el.classList.contains('hidden')?'+':'−'; }
    if(act==='roast'){ const el=document.getElementById('roast'); el.textContent=roastLine(); }
    if(act==='logout'){ state.user=null; save(); location.hash='#home'; }
    if(act==='newGoal'){ openGoalModal(); }
    if(act==='delGoal'){ state.goals=state.goals.filter(g=>g.id!==a.getAttribute('data-id')); save(); render(); }
    if(act==='contrib'){ const id=a.getAttribute('data-id'); const inp=document.getElementById('contrib-'+id); const amt=+inp.value; if(amt){ const g=state.goals.find(x=>x.id===id); g.saved=Math.max(0,g.saved+amt); if(g.saved>=g.target){g.completed=true; state.profile.xp+=100;} save(); render(); } }
    if(act==='delExp'){ state.expenses=state.expenses.filter(x=>x.id!==a.getAttribute('data-id')); save(); render(); }
    if(act==='tf'){ a.parentElement.querySelectorAll('button').forEach(b=>{b.style.background='';b.classList.remove('text-white');b.classList.add('text-slate-400');}); a.style.background='linear-gradient(90deg,#3b82f6,#8b5cf6)'; a.classList.add('text-white'); a.classList.remove('text-slate-400'); if(charts.spend)charts.spend.destroy(); drawSpend(a.getAttribute('data-tf')); }
    if(act==='ask'){ sendChat(a.getAttribute('data-q')); }
    if(act==='startChal'){ const t=CHALLENGES.find(c=>c.key===a.getAttribute('data-key')); state.challenges.push({...t,status:'active'}); save(); render(); }
    if(act==='doneChal'){ const c=state.challenges.find(x=>x.key===a.getAttribute('data-key')&&x.status==='active'); if(c){c.status='completed'; state.profile.xp+=c.xp;} save(); render(); }
    if(act==='setPlan'){ state.profile.plan=a.getAttribute('data-plan'); save(); render(); }
    if(act==='export'){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const u=URL.createObjectURL(blob); const x=document.createElement('a'); x.href=u; x.download='goalify-data.json'; x.click(); URL.revokeObjectURL(u); }
    if(act==='wipe'){ if(confirm('Reset all demo data?')){ reset(); location.hash='#home'; render(); } }
    if(act==='quizPick'){ quizAns[QUIZ[quizStep].id]=+a.getAttribute('data-i'); quizStep++; renderQuiz(); }
    if(act==='quizBack'){ quizStep=Math.max(0,quizStep-1); renderQuiz(); }
  });

  document.addEventListener('submit',e=>{
    const f=e.target;
    if(f.id==='authForm'){ e.preventDefault(); const fd=new FormData(f); state.user={name:fd.get('name')||(fd.get('email')+'').split('@')[0],email:fd.get('email')}; save(); location.hash = state.profile.onboarded?'#app/dashboard':'#quiz'; }
    if(f.id==='expForm'){ e.preventDefault(); const fd=new FormData(f); state.expenses.push({id:uid(),amount:+fd.get('amount'),category:fd.get('category'),merchant:fd.get('merchant'),date:fd.get('date')||todayISO()}); save(); render(); }
    if(f.id==='profForm'){ e.preventDefault(); const fd=new FormData(f); if(state.user)state.user.name=fd.get('name'); state.profile.income=+fd.get('income')||0; state.profile.currency=fd.get('currency'); save(); render(); }
    if(f.id==='chatForm'){ e.preventDefault(); const inp=document.getElementById('chatInput'); const v=inp.value.trim(); if(v){ inp.value=''; sendChat(v); } }
  });

  document.addEventListener('input',e=>{ if(e.target.closest('[data-action="sim"]')) runSimulator(); });

  // Goal modal
  function openGoalModal(){
    const EMO=['🎯','📱','💻','🚗','✈️','🏠','🛡️','🎓','💍','🎮','🏝️','💰'];
    const wrap=document.createElement('div');
    wrap.className='fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4';
    wrap.innerHTML=`<div class="w-full max-w-md glass-strong rounded-2xl p-6" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between"><h2 class="text-xl font-bold">New goal</h2><button id="gmClose" class="text-slate-400">✕</button></div>
      <div class="mt-5 space-y-4">
        <div><span class="mb-1.5 block text-sm font-medium">Icon</span><div id="gmEmo" class="flex flex-wrap gap-2">${EMO.map((x,i)=>`<button data-e="${x}" class="flex h-9 w-9 items-center justify-center rounded-lg text-lg ${i===0?'ring-1 ring-accent-purple bg-accent-purple/20':'bg-white/5'}">${x}</button>`).join('')}</div></div>
        <div><label class="mb-1.5 block text-sm font-medium">Goal name</label><input id="gmName" class="input" placeholder="e.g. New MacBook"></div>
        <div class="grid grid-cols-2 gap-3"><div><label class="mb-1.5 block text-sm font-medium">Target (€)</label><input id="gmTarget" type="number" class="input" placeholder="1200"></div><div><label class="mb-1.5 block text-sm font-medium">Monthly (€)</label><input id="gmMonthly" type="number" class="input" placeholder="150"></div></div>
        <p id="gmErr" class="text-sm text-red-300"></p>
        <button id="gmSave" class="btn btn-primary w-full">Create goal</button>
      </div>
    </div>`;
    wrap.addEventListener('click',()=>wrap.remove());
    document.body.appendChild(wrap);
    let emo='🎯';
    wrap.querySelector('#gmEmo').addEventListener('click',ev=>{const b=ev.target.closest('[data-e]');if(!b)return;emo=b.getAttribute('data-e');wrap.querySelectorAll('#gmEmo button').forEach(x=>{x.className='flex h-9 w-9 items-center justify-center rounded-lg text-lg bg-white/5';});b.className='flex h-9 w-9 items-center justify-center rounded-lg text-lg ring-1 ring-accent-purple bg-accent-purple/20';});
    wrap.querySelector('#gmClose').addEventListener('click',()=>wrap.remove());
    wrap.querySelector('#gmSave').addEventListener('click',()=>{
      const name=wrap.querySelector('#gmName').value.trim(), target=+wrap.querySelector('#gmTarget').value, monthly=+wrap.querySelector('#gmMonthly').value||0;
      const limit=PLANS[state.profile.plan].goalLimit, active=state.goals.filter(g=>!g.completed).length;
      if(!name||!target){ wrap.querySelector('#gmErr').textContent='Enter a name and target amount.'; return; }
      if(limit!==-1 && active>=limit){ wrap.querySelector('#gmErr').textContent='Free plan limit reached. Upgrade for unlimited goals.'; return; }
      state.goals.unshift({id:uid(),name,emoji:emo,target,saved:0,monthly,completed:false}); save(); wrap.remove(); render();
    });
  }

  window.addEventListener('hashchange',render);
  render();
  </script>
</body>
</html>
