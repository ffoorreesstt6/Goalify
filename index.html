<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goalify — Turn Every Euro Into Progress</title>
  <meta name="description" content="AI-powered personal finance & goal-tracking. Track spending, reach goals faster, get AI financial coaching." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    tailwind.config = { darkMode:'class', theme:{ extend:{
      colors:{ accent:{ blue:'#3b82f6', purple:'#8b5cf6', violet:'#a855f7' } },
      fontFamily:{ sans:['Inter','system-ui','sans-serif'] },
      animation:{ float:'float 6s ease-in-out infinite', 'fade-up':'fadeUp .5s ease forwards' },
      keyframes:{ float:{'0%,100%':{transform:'translateY(0)'},'50%':{transform:'translateY(-20px)'}}, fadeUp:{'0%':{opacity:0,transform:'translateY(16px)'},'100%':{opacity:1,transform:'translateY(0)'}} },
    }}};
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{color-scheme:dark}
    body{background:#070A14;color:#f1f5f9;font-family:Inter,system-ui,sans-serif;overflow-x:hidden}
    .glass{background:rgba(255,255,255,.04);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08)}
    .glass-strong{background:rgba(255,255,255,.07);backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.12)}
    .gtext{background:linear-gradient(135deg,#60a5fa,#a78bfa,#c084fc);-webkit-background-clip:text;background-clip:text;color:transparent}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:.75rem;padding:.75rem 1.5rem;font-weight:600;transition:.25s;cursor:pointer;border:none;text-decoration:none}
    .btn-primary{color:#fff;background:linear-gradient(135deg,#4f46e5,#8b5cf6);box-shadow:0 8px 24px -8px rgba(99,102,241,.6)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 32px -8px rgba(139,92,246,.8)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-ghost{color:#fff;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
    .btn-ghost:hover{background:rgba(255,255,255,.1)}
    .orb{position:absolute;border-radius:9999px;filter:blur(80px);opacity:.5;pointer-events:none}
    .input{width:100%;border-radius:.75rem;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);padding:.65rem 1rem;font-size:.875rem;outline:none;color:#f1f5f9}
    .input:focus{border-color:rgba(168,85,247,.6)}
    .label{margin-bottom:.35rem;display:block;font-size:.8rem;font-weight:500;color:#cbd5e1}
    ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:#070A14}
    ::-webkit-scrollbar-thumb{background:linear-gradient(#4f46e5,#8b5cf6);border-radius:8px}
    .grid-bg{background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(ellipse at center,#000 35%,transparent 75%);mask-image:radial-gradient(ellipse at center,#000 35%,transparent 75%)}
    .nav-link.active{background:linear-gradient(90deg,rgba(59,130,246,.2),rgba(139,92,246,.2))}
    .toast{position:fixed;bottom:1.25rem;right:1.25rem;z-index:80;border-radius:.75rem;padding:.75rem 1rem;font-size:.875rem}
    .anim{animation:fadeUp .5s ease forwards}
    .progress-fill{transition:width .8s cubic-bezier(.4,0,.2,1)}
  </style>
</head>
<body>
  <div id="root" class="min-h-screen"><div class="flex min-h-screen items-center justify-center text-slate-500">Loading…</div></div>
  <div id="modal"></div>
  <div id="toast"></div>
  <script type="module" src="./app.js?v=5"></script>
</body>
</html>
