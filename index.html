<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goalify — Turn Every Euro Into Progress</title>
  <meta name="description" content="Goalify helps you track spending, build better habits, and reach your savings goals faster. Simple, premium and made for everyone." />
  <link rel="icon" type="image/png" href="./assets/favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
  <meta name="theme-color" content="#030712" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    tailwind.config = { darkMode:'class', theme:{ extend:{
      colors:{ accent:{ blue:'#3b82f6', purple:'#8b5cf6', violet:'#a855f7' } },
      fontFamily:{ sans:['Inter','system-ui','sans-serif'] },
      animation:{ float:'float 6s ease-in-out infinite', 'fade-up':'fadeUp .5s ease forwards' },
      keyframes:{ float:{'0%,100%':{transform:'translateY(0)'},'50%':{transform:'translateY(-20px)'}}, fadeUp:{'0%':{opacity:0,transform:'translateY(16px)'},'100%':{opacity:1,transform:'translateY(0)'}} },
    }}};
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ---- theme tokens ---- */
    :root{
      color-scheme:dark;
      --bg:#030712; --text:#F3F4F6; --muted:#9CA3AF;
      --card:#111827; --sidebar:#0F172A;
      --glass:#111827; --glass-strong:#0F172A; --border:#1F2937;
      --accent1:#7C3AED; --accent2:#8B5CF6; --accent3:#A78BFA;
    }
    /* full-color modes — accent + a tinted background for dark mode */
    html[data-accent="blue"]  {--accent1:#7C3AED;--accent2:#8B5CF6;--accent3:#A78BFA;--bg:#030712}
    html[data-accent="green"] {--accent1:#059669;--accent2:#22c55e;--accent3:#4ade80;--bg:#06140d}
    html[data-accent="yellow"]{--accent1:#ca8a04;--accent2:#eab308;--accent3:#facc15;--bg:#15120a}
    html[data-accent="orange"]{--accent1:#ea580c;--accent2:#f97316;--accent3:#fb923c;--bg:#160c06}
    html[data-accent="pink"]  {--accent1:#db2777;--accent2:#ec4899;--accent3:#f472b6;--bg:#170a12}
    html[data-accent="red"]   {--accent1:#dc2626;--accent2:#ef4444;--accent3:#f87171;--bg:#180809}
    html[data-accent="grey"]  {--accent1:#4b5563;--accent2:#6b7280;--accent3:#9ca3af;--bg:#0e0f12}
    /* light mode */
    html.light{
      color-scheme:light;
      --bg:#FAFAFA; --text:#111827; --muted:#6B7280;
      --card:#FFFFFF; --glass:#FFFFFF; --glass-strong:#FFFFFF; --border:#E5E7EB;
    }
    body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;overflow-x:hidden;transition:background .3s,color .3s}
    /* solid cards — no glassmorphism */
    .glass{background:var(--glass);border:1px solid var(--border)}
    .glass-strong{background:var(--glass-strong);border:1px solid var(--border)}
    html.light .glass,html.light .glass-strong{box-shadow:0 1px 3px rgba(17,24,39,.06),0 1px 2px rgba(17,24,39,.04)}
    .gtext{background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));-webkit-background-clip:text;background-clip:text;color:transparent}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:.75rem;padding:.75rem 1.5rem;font-weight:600;transition:.25s;cursor:pointer;border:none;text-decoration:none}
    .btn-primary{color:#fff;background:linear-gradient(135deg,var(--accent1),var(--accent2));box-shadow:0 8px 24px -8px rgba(99,102,241,.5)}
    .btn-primary:hover{transform:translateY(-1px);filter:brightness(1.05)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-ghost{color:var(--text);background:var(--glass);border:1px solid var(--border)}
    .btn-ghost:hover{filter:brightness(1.1)}
    .orb{position:absolute;border-radius:9999px;filter:blur(80px);opacity:.5;pointer-events:none}
    .input{width:100%;border-radius:.75rem;border:1px solid var(--border);background:var(--glass);padding:.65rem 1rem;font-size:.875rem;outline:none;color:var(--text)}
    .input:focus{border-color:var(--accent2)}
    .label{margin-bottom:.35rem;display:block;font-size:.8rem;font-weight:500;color:var(--muted)}
    ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent1),var(--accent2));border-radius:8px}
    .grid-bg{background-image:linear-gradient(rgba(128,128,128,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(128,128,128,.08) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(ellipse at center,#000 35%,transparent 75%);mask-image:radial-gradient(ellipse at center,#000 35%,transparent 75%)}
    .nav-link.active{background:linear-gradient(90deg,var(--glass-strong),var(--glass))}
    .toast{position:fixed;bottom:1.25rem;right:1.25rem;z-index:80;border-radius:.75rem;padding:.75rem 1rem;font-size:.875rem}
    .anim{animation:fadeUp .5s ease forwards}
    .progress-fill{transition:width .8s cubic-bezier(.4,0,.2,1)}
    /* accent helpers driven by theme */
    .text-accent-purple{color:var(--accent2)!important}
    .text-accent-violet{color:var(--accent3)!important}
    /* light-mode legibility for tailwind utility colors used across views */
    html.light .text-slate-400,html.light .text-slate-300,html.light .text-slate-500{color:#64748b!important}
    html.light .bg-white\/5{background:rgba(15,23,42,.04)!important}
    html.light .bg-white\/10{background:rgba(15,23,42,.07)!important}
    html.light .border-white\/10,html.light .border-white\/5{border-color:rgba(15,23,42,.10)!important}
    html.light aside{background:rgba(255,255,255,.85)!important}
    /* ---- decorative background designs (paid plans) ---- */
    body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;background:var(--bg);transition:opacity .5s}
    body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:0;transition:opacity .5s;background:transparent}
    html[data-bg="aurora"] body::after{opacity:.55;filter:blur(60px);background:
      radial-gradient(38% 38% at 12% 18%, color-mix(in srgb,var(--accent1) 60%,transparent), transparent 70%),
      radial-gradient(42% 42% at 88% 14%, color-mix(in srgb,var(--accent2) 55%,transparent), transparent 70%),
      radial-gradient(46% 46% at 72% 88%, color-mix(in srgb,var(--accent3) 50%,transparent), transparent 70%)}
    html[data-bg="mesh"] body::after{opacity:.40;background:
      radial-gradient(at 18% 22%, color-mix(in srgb,var(--accent1) 55%,transparent), transparent 45%),
      radial-gradient(at 82% 26%, color-mix(in srgb,var(--accent2) 50%,transparent), transparent 45%),
      radial-gradient(at 48% 82%, color-mix(in srgb,var(--accent3) 48%,transparent), transparent 45%),
      radial-gradient(at 92% 90%, color-mix(in srgb,var(--accent1) 40%,transparent), transparent 45%)}
    html[data-bg="glow"] body::after{opacity:.6;background:
      radial-gradient(70% 55% at 50% -8%, color-mix(in srgb,var(--accent2) 45%,transparent), transparent 72%),
      radial-gradient(55% 45% at 100% 100%, color-mix(in srgb,var(--accent3) 38%,transparent), transparent 70%)}
    html[data-bg="grid"] body::after{opacity:.5;background-image:
      linear-gradient(color-mix(in srgb,var(--accent2) 22%,transparent) 1px,transparent 1px),
      linear-gradient(90deg,color-mix(in srgb,var(--accent2) 22%,transparent) 1px,transparent 1px);
      background-size:42px 42px;-webkit-mask-image:radial-gradient(ellipse at center,#000 30%,transparent 78%);mask-image:radial-gradient(ellipse at center,#000 30%,transparent 78%)}
    html[data-bg="dots"] body::after{opacity:.5;background-image:radial-gradient(color-mix(in srgb,var(--accent2) 40%,transparent) 1.4px,transparent 1.4px);background-size:24px 24px;-webkit-mask-image:radial-gradient(ellipse at center,#000 35%,transparent 80%);mask-image:radial-gradient(ellipse at center,#000 35%,transparent 80%)}
    /* ============================================================
       BUSINESS OS — luxury executive theme (Business plan only)
       data-biz="1" overrides accent tokens to gold; placed AFTER
       data-accent rules so it always wins regardless of chosen color.
       ============================================================ */
    html[data-biz="1"]{
      color-scheme:dark;
      --bg:#07070b; --text:#f7f3e8; --muted:#a39b86;
      --glass:rgba(212,175,55,.045); --glass-strong:rgba(212,175,55,.08);
      --border:rgba(212,175,55,.16);
      --accent1:#a9842b; --accent2:#d4af37; --accent3:#f3d97c;
    }
    html[data-biz="1"] body{
      background:
        radial-gradient(60% 50% at 85% -5%, rgba(212,175,55,.10), transparent 70%),
        radial-gradient(45% 40% at 0% 100%, rgba(212,175,55,.07), transparent 70%),
        #07070b;
    }
    html[data-biz="1"] aside{background:linear-gradient(180deg,rgba(20,17,8,.96),rgba(8,8,12,.96))!important;border-color:rgba(212,175,55,.18)!important}
    .gold-text{background:linear-gradient(135deg,#f3d97c,#d4af37,#b8860b);-webkit-background-clip:text;background-clip:text;color:transparent}
    .biz-card{background:linear-gradient(160deg,rgba(212,175,55,.07),rgba(255,255,255,.015));border:1px solid rgba(212,175,55,.16);border-radius:1rem;backdrop-filter:blur(18px);transition:transform .25s,border-color .25s,box-shadow .25s}
    .biz-card:hover{transform:translateY(-2px);border-color:rgba(212,175,55,.4);box-shadow:0 16px 40px -20px rgba(212,175,55,.5)}
    .biz-kpi{position:relative;overflow:hidden}
    .biz-kpi::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:9999px;background:radial-gradient(circle,rgba(212,175,55,.16),transparent 70%);pointer-events:none}
    .biz-ring{box-shadow:0 0 0 1px rgba(212,175,55,.25),0 8px 30px -12px rgba(212,175,55,.4)}
    html[data-biz="1"] .nav-link.active{background:linear-gradient(90deg,rgba(212,175,55,.22),rgba(212,175,55,.05));border:1px solid rgba(212,175,55,.3)}
    .biz-pill{font-size:.6rem;letter-spacing:.12em;font-weight:800;text-transform:uppercase;color:#0a0a0f;background:linear-gradient(135deg,#f3d97c,#d4af37);padding:.15rem .5rem;border-radius:9999px}
    .biz-tr{border-bottom:1px solid rgba(212,175,55,.10)}
    .biz-tag{display:inline-flex;align-items:center;gap:.25rem;font-size:.7rem;font-weight:600;padding:.1rem .55rem;border-radius:9999px}
    .biz-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.3),transparent)}
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    /* ---- achievement badges + profile ring effects (Pro/Premium) ---- */
    @keyframes badgePop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
    .badge-pop{display:inline-block;animation:badgePop .45s ease both}
    @keyframes avSpin{to{transform:rotate(360deg)}}
    @keyframes avPulse{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent2) 50%,transparent)}50%{box-shadow:0 0 0 6px transparent}}
    .av-pro::before,.av-premium::before{content:"";position:absolute;inset:-3px;border-radius:9999px;padding:2px;background:conic-gradient(from 0deg,var(--accent1),var(--accent2),var(--accent3),var(--accent1));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:avSpin 5s linear infinite;pointer-events:none}
    .av-premium::before{animation:avSpin 3s linear infinite}
    .av-premium{animation:avPulse 2.6s ease-in-out infinite;border-radius:9999px}
    /* ---- social profile banners (Pro / Premium) ---- */
    @keyframes bannerShift{0%{background-position:0% 50%}100%{background-position:200% 50%}}
    .pf-banner-pro{background:linear-gradient(120deg,var(--accent1),var(--accent2),var(--accent3))}
    .pf-banner-premium{background:linear-gradient(120deg,var(--accent1),var(--accent2),var(--accent3),var(--accent2),var(--accent1));background-size:220% 220%;animation:bannerShift 7s linear infinite}
    .pf-banner-premium::before{content:"";position:absolute;inset:0;background:radial-gradient(45% 120% at 18% 0%,rgba(255,255,255,.30),transparent 60%),radial-gradient(40% 120% at 85% 100%,rgba(255,255,255,.18),transparent 60%);mix-blend-mode:overlay;pointer-events:none}
    .pf-banner-premium::after{content:"";position:absolute;inset:0;background:radial-gradient(2px 2px at 20% 40%,#fff8,transparent),radial-gradient(2px 2px at 60% 30%,#fff6,transparent),radial-gradient(1.5px 1.5px at 80% 60%,#fff7,transparent),radial-gradient(1.5px 1.5px at 40% 70%,#fff5,transparent);opacity:.7;pointer-events:none}
    /* ===== profile level-progression frames (bronze → ultimate) ===== */
    .pf-frame{position:relative;display:inline-flex;align-items:center;justify-content:center;border-radius:9999px;will-change:transform}
    .pf-frame-inner{position:relative;display:inline-flex;border-radius:9999px;z-index:1}
    .pf-frame::before{content:"";position:absolute;inset:-5px;border-radius:9999px;padding:3px;-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:2}
    .pf-title-chip{display:inline-flex;align-items:center;gap:.25rem;font-size:.72rem;font-weight:700;padding:.18rem .6rem;border-radius:9999px;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff}
    .pf-crown{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:18px;z-index:3;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));animation:crownFloat 3s ease-in-out infinite}
    .pf-mini .pf-crown{font-size:11px;top:-9px}
    @keyframes crownFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}
    @keyframes pfGlow{0%,100%{opacity:.45}50%{opacity:.9}}
    @keyframes pfAura{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.08);opacity:.9}}
    @keyframes pfPulse{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.12);opacity:1}}
    @keyframes pfShine{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @keyframes pfFloat{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-4px);opacity:1}}
    @keyframes pfSparkle{0%,100%{opacity:.3;transform:scale(.96)}50%{opacity:1;transform:scale(1.04)}}
    /* L1-9 basic */
    .frame-basic::before{background:linear-gradient(135deg,#64748b,#94a3b8);opacity:.6}
    .frame-basic .pf-frame-inner{box-shadow:0 0 10px -2px rgba(148,163,184,.5)}
    /* L10 bronze */
    .frame-bronze::before{background:conic-gradient(from 0deg,#cd7f32,#e8a96a,#cd7f32,#8c5a2b,#cd7f32);animation:avSpin 6s linear infinite}
    .frame-bronze .pf-frame-inner{box-shadow:0 0 12px -2px rgba(205,127,50,.55)}
    /* L20 bronze + sparkle */
    .frame-bronze2::before{background:conic-gradient(from 0deg,#e0915a,#ffd0a8,#cd7f32,#e0915a);animation:avSpin 5s linear infinite}
    .frame-bronze2 .pf-frame-inner{box-shadow:0 0 14px -2px rgba(224,145,90,.6)}
    .frame-bronze2::after{content:"";position:absolute;inset:-9px;border-radius:9999px;background:radial-gradient(2px 2px at 20% 25%,#ffe0b8,transparent),radial-gradient(1.5px 1.5px at 80% 30%,#ffd0a0,transparent),radial-gradient(2px 2px at 68% 80%,#fff,transparent),radial-gradient(1.5px 1.5px at 28% 78%,#ffe0b8,transparent);pointer-events:none;z-index:2;animation:pfSparkle 2.2s ease-in-out infinite}
    /* L30 silver + shine */
    .frame-silver::before{background:conic-gradient(from 0deg,#c0c7d0,#ffffff,#9aa3b2,#c0c7d0);animation:avSpin 5s linear infinite}
    .frame-silver .pf-frame-inner{box-shadow:0 0 14px -2px rgba(200,210,225,.6)}
    .frame-silver::after{content:"";position:absolute;inset:-3px;border-radius:9999px;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.7) 50%,transparent 70%);background-size:250% 250%;animation:pfShine 3.2s linear infinite;pointer-events:none;z-index:2;mix-blend-mode:screen}
    /* L40 silver + floating particles */
    .frame-silver2::before{background:conic-gradient(from 0deg,#dde3ec,#fff,#b9c2d0,#dde3ec);animation:avSpin 4.5s linear infinite}
    .frame-silver2 .pf-frame-inner{box-shadow:0 0 16px -2px rgba(221,227,236,.65)}
    .frame-silver2::after{content:"";position:absolute;inset:-10px;border-radius:9999px;background:radial-gradient(2px 2px at 20% 30%,#fff,transparent),radial-gradient(1.5px 1.5px at 80% 25%,#fff,transparent),radial-gradient(2px 2px at 65% 80%,#fff,transparent),radial-gradient(1.5px 1.5px at 30% 75%,#fff,transparent);pointer-events:none;z-index:2;animation:pfFloat 4s ease-in-out infinite}
    /* L50 gold + glow */
    .frame-gold::before{background:conic-gradient(from 0deg,#f5c542,#fff1b8,#e0a020,#f5c542);animation:avSpin 4.5s linear infinite}
    .frame-gold .pf-frame-inner{box-shadow:0 0 18px -1px rgba(245,197,66,.7)}
    .frame-gold::after{content:"";position:absolute;inset:-6px;border-radius:9999px;box-shadow:0 0 22px 2px rgba(245,197,66,.45);animation:pfGlow 2.6s ease-in-out infinite;pointer-events:none;z-index:0}
    /* L60 premium gold + aura */
    .frame-gold2::before{background:conic-gradient(from 0deg,#ffd75e,#fff4c2,#f0b429,#ffd75e);animation:avSpin 4s linear infinite}
    .frame-gold2 .pf-frame-inner{box-shadow:0 0 20px 0 rgba(255,215,94,.75)}
    .frame-gold2::after{content:"";position:absolute;inset:-12px;border-radius:9999px;background:radial-gradient(circle,rgba(255,215,94,.35),transparent 65%);animation:pfAura 3s ease-in-out infinite;pointer-events:none;z-index:0}
    /* L70 platinum + dynamic light */
    .frame-platinum::before{background:conic-gradient(from 0deg,#d8f1ff,#ffffff,#9fc8e0,#d8f1ff);animation:avSpin 3.5s linear infinite}
    .frame-platinum .pf-frame-inner{box-shadow:0 0 20px 0 rgba(216,241,255,.8)}
    .frame-platinum::after{content:"";position:absolute;inset:-4px;border-radius:9999px;padding:3px;background:conic-gradient(from 0deg,transparent 0deg,rgba(255,255,255,.85) 40deg,transparent 80deg);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:avSpin 2.4s linear infinite;pointer-events:none;z-index:2}
    /* L80 diamond + crystal particles */
    .frame-diamond::before{background:conic-gradient(from 0deg,#7ee8fa,#eafcff,#5ab8e0,#a0f0ff,#7ee8fa);animation:avSpin 3.5s linear infinite}
    .frame-diamond .pf-frame-inner{box-shadow:0 0 22px 0 rgba(126,232,250,.8)}
    .frame-diamond::after{content:"";position:absolute;inset:-11px;border-radius:9999px;background:radial-gradient(2.5px 2.5px at 18% 25%,#dffaff,transparent),radial-gradient(2px 2px at 82% 30%,#bff2ff,transparent),radial-gradient(2.5px 2.5px at 70% 82%,#fff,transparent),radial-gradient(2px 2px at 28% 78%,#cdeeff,transparent),radial-gradient(1.5px 1.5px at 50% 12%,#fff,transparent);pointer-events:none;z-index:2;animation:pfSparkle 1.8s ease-in-out infinite}
    /* L90 legendary + energy */
    .frame-legendary::before{background:conic-gradient(from 0deg,#b388ff,#e0c3ff,#7c4dff,#b388ff,#9d4edd);animation:avSpin 3s linear infinite}
    .frame-legendary .pf-frame-inner{box-shadow:0 0 26px 0 rgba(157,78,221,.85)}
    .frame-legendary::after{content:"";position:absolute;inset:-12px;border-radius:9999px;background:radial-gradient(circle,rgba(157,78,221,.4),transparent 60%);animation:pfPulse 1.8s ease-in-out infinite;pointer-events:none;z-index:0}
    /* L100 ultimate + crown + aura */
    .frame-ultimate::before{background:conic-gradient(from 0deg,#ffe27a,#fff,#ff8a00,#ff3d81,#7c4dff,#00e5ff,#ffe27a);animation:avSpin 4s linear infinite}
    .frame-ultimate .pf-frame-inner{box-shadow:0 0 30px 2px rgba(255,226,122,.9)}
    .frame-ultimate::after{content:"";position:absolute;inset:-16px;border-radius:9999px;background:conic-gradient(from 0deg,rgba(255,226,122,0),rgba(255,138,0,.35),rgba(255,61,129,.35),rgba(124,77,255,.35),rgba(0,229,255,.35),rgba(255,226,122,0));animation:avSpin 6s linear infinite reverse;pointer-events:none;z-index:0;filter:blur(2px)}
    /* ===== onboarding cards (mobile-first, large tap targets) ===== */
    .ob-card{display:flex;align-items:center;border-radius:1rem;border:1px solid var(--border);background:var(--glass);cursor:pointer;color:var(--text);text-align:left;transition:transform .15s ease,border-color .15s ease,background .15s ease;-webkit-tap-highlight-color:transparent}
    .ob-card:hover{transform:translateY(-2px)}
    .ob-card.sel{border-color:var(--accent2);background:color-mix(in srgb,var(--accent2) 14%,transparent);box-shadow:0 0 0 1px var(--accent2)}
    .ob-chip{position:relative;display:flex;align-items:center;gap:.5rem;border-radius:.9rem;border:1px solid var(--border);background:var(--glass);padding:.7rem .8rem;font-size:.82rem;font-weight:500;color:var(--text);cursor:pointer;transition:transform .15s ease,border-color .15s ease,background .15s ease;-webkit-tap-highlight-color:transparent}
    .ob-chip:hover{transform:translateY(-2px)}
    .ob-chip.sel{border-color:var(--accent2);background:color-mix(in srgb,var(--accent2) 16%,transparent);box-shadow:0 0 0 1px var(--accent2)}
    .ob-chip .ob-rank{position:absolute;top:-7px;left:-7px;display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:9999px;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;font-size:.7rem;font-weight:800}
